# Local-only preview. Run with: docker compose -f compose.local.yaml up --build
services:
  caddy:
    image: caddy:2-alpine
    container_name: duola-caddy-local
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./docker/Caddyfile.local:/etc/caddy/Caddyfile:ro
    networks:
      - site

  wordpress:
    build:
      context: .
      dockerfile: docker/wordpress/Dockerfile
    image: duola-pocket-wordpress:local
    container_name: duola-wordpress-local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_AUTH_KEY: ${WORDPRESS_AUTH_KEY}
      WORDPRESS_SECURE_AUTH_KEY: ${WORDPRESS_SECURE_AUTH_KEY}
      WORDPRESS_LOGGED_IN_KEY: ${WORDPRESS_LOGGED_IN_KEY}
      WORDPRESS_NONCE_KEY: ${WORDPRESS_NONCE_KEY}
      WORDPRESS_AUTH_SALT: ${WORDPRESS_AUTH_SALT}
      WORDPRESS_SECURE_AUTH_SALT: ${WORDPRESS_SECURE_AUTH_SALT}
      WORDPRESS_LOGGED_IN_SALT: ${WORDPRESS_LOGGED_IN_SALT}
      WORDPRESS_NONCE_SALT: ${WORDPRESS_NONCE_SALT}
      WORDPRESS_CONFIG_EXTRA: |
        define('DISALLOW_FILE_EDIT', true);
        define('WP_ENVIRONMENT_TYPE', 'local');
        define('WP_MEMORY_LIMIT', '128M');
    volumes:
      - ./wordpress/wp-content/themes/duola-pocket:/var/www/html/wp-content/themes/duola-pocket:ro
      - ./wordpress/wp-content/plugins/duola-albums:/var/www/html/wp-content/plugins/duola-albums:ro
      - ./data/local/uploads:/var/www/html/wp-content/uploads
    networks:
      - site

  db:
    image: mariadb:11
    container_name: duola-mariadb-local
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME}
      MARIADB_USER: ${WORDPRESS_DB_USER}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - ./data/local/mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - site

networks:
  site:
    name: duola-pocket-local-network
